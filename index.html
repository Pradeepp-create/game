<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fight Night</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="gameContainer">
        <!-- START SCREEN -->
        <div id="startScreen">
            <h1>🥊 FIGHT NIGHT 🥊</h1>
            <p>Street Fighter Style - Pure JS</p>
            <div>
                <label>Difficulty:</label>
                <select id="diffSelect">
                    <option value="1">Easy</option>
                    <option value="2" selected>Medium</option>
                    <option value="3">Hard</option>
                </select>
            </div>
            <button id="playBtn">START BATTLE</button>
            <div id="controls">
                ←→ Move | ↑ Jump | F Punch | G Kick | Q SPECIAL
            </div>
        </div>

        <!-- GAME CANVAS -->
        <canvas id="gameCanvas" width="1000" height="500"></canvas>

        <!-- UI -->
        <div id="gameUI">
            <div class="health-container">
                <span>PLAYER</span>
                <div class="health-bar">
                    <div id="playerHealth" class="health-fill"></div>
                </div>
            </div>
            <div id="comboDisplay">READY</div>
            <div class="health-container">
                <span>ENEMY</span>
                <div class="health-bar">
                    <div id="enemyHealth" class="health-fill"></div>
                </div>
            </div>
        </div>

        <!-- GAME OVER -->
        <div id="gameOverScreen">
            <h2 id="gameOverText"></h2>
            <button id="restartBtn">FIGHT AGAIN</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
