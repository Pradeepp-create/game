<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fight Night</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <div id="startScreen">
            <h1>🥊 FIGHT NIGHT 🥊</h1>
            <p>Arrow Keys + F/G/Q</p>
            <button onclick="startFight()">START BATTLE</button>
        </div>

        <canvas id="canvas" width="900" height="450"></canvas>

        <div id="ui" class="hidden">
            <div>
                <div>YOU</div>
                <div class="health"><div id="pHealth" class="health-fill"></div></div>
            </div>
            <div id="combo">READY</div>
            <div>
                <div>ENEMY</div>
                <div class="health"><div id="eHealth" class="health-fill"></div></div>
            </div>
        </div>

        <div id="gameOver" class="hidden">
            <h2 id="result">GAME OVER</h2>
            <button onclick="restartFight()">AGAIN!</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
