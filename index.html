<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fight Night Pro</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="container">

    <!-- START SCREEN -->
    <div id="startScreen">
        <h1 class="title">FIGHT NIGHT PRO</h1>
        <p class="subtitle">Street Combat • Smooth Animations • Smart AI</p>

        <div class="controls-box">
            ⬅️ ➡️ Move<br>
            ⬆️ Jump<br>
            SHIFT Dash<br>
            F Attack
        </div>

        <button id="startBtn">START FIGHT</button>
    </div>

    <!-- CANVAS -->
    <canvas id="canvas" width="1000" height="500"></canvas>

    <!-- HUD -->
    <div id="hud" class="hidden">

        <div class="hud-side">
            <div class="name">PLAYER</div>
            <div class="health-bar">
                <div id="pHealth" class="health-fill player"></div>
                <span id="pHPText">200</span>
            </div>
        </div>

        <div class="hud-center">
            <div id="timer">60</div>
            <div id="comboText">FIGHT!</div>
        </div>

        <div class="hud-side right">
            <div class="name">ENEMY</div>
            <div class="health-bar">
                <div id="eHealth" class="health-fill enemy"></div>
                <span id="eHPText">200</span>
            </div>
        </div>

    </div>

    <!-- GAME OVER -->
    <div id="gameOver" class="hidden">
        <h1 id="result"></h1>
        <button id="restartBtn">REPLAY</button>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
