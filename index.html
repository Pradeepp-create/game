<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🥊 FIGHT NIGHT PRO 🥊</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <!-- START -->
        <div id="startScreen">
            <div class="neon-title">🥊 FIGHT NIGHT PRO 🥊</div>
            <p class="neon-text">HARDCORE AI | ARCADE GRAPHICS</p>
            <div class="controls">
                ←→A/D Move | ↑W Jump | F Punch | G Kick | Q ULTRA
            </div>
            <button class="neon-btn" onclick="startFight()">ENTER ARENA</button>
        </div>

        <!-- ARENA -->
        <canvas id="canvas" width="1000" height="500"></canvas>

        <!-- HUD -->
        <div id="hud" class="hidden">
            <div class="fighter-info">
                <div class="name">RYU</div>
                <div class="health-bar"><div id="pHealth" class="health-fill"></div></div>
            </div>
            <div id="combo" class="combo-display">READY</div>
            <div class="fighter-info">
                <div class="name">AKUMA</div>
                <div class="health-bar"><div id="eHealth" class="health-fill"></div></div>
            </div>
        </div>

        <!-- GAME OVER -->
        <div id="gameOver" class="hidden">
            <div class="neon-title" id="result">GAME OVER</div>
            <button class="neon-btn" onclick="restartFight()">REVENGE</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
